<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
 * /Footer Styling */
.main-footer {
    background-color: #fcfcfc;
    padding: 60px 10%;
    border-top: 1px solid #eee;
}

.footer-container {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 40px;
}

.footer-brand h3 {
    margin: 0 0 10px 0;
    font-size: 1.5rem;
}

.footer-brand p {
    color: #888;
    font-size: 0.9rem;
}

.social-icons {
    margin-top: 15px;
    display: flex;
    gap: 15px;
    color: #555;
}

.footer-links {
    display: flex;
    gap: 60px;
    flex-wrap: wrap;
}

.link-group h4 {
    font-size: 0.8rem;
    color: #999;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

.link-group a, .link-group p {
    display: block;
    text-decoration: none;
    color: #444;
    font-size: 0.9rem;
    margin-bottom: 10px;
}

.link-group a:hover {
    color: #ff4d00;
}

/* Responsive Footer */
@media (max-width: 768px) {
    .footer-container {
        flex-direction: column;
        text-align: center;
    }
    .footer-links {
        justify-content: center;
        gap: 30px;
    }
}
    </style>
</head>
<body>
    <footer class="main-footer">
    <div class="footer-container">
        <div class="footer-brand">
            <h3>Designpro</h3>
            <p>Design, Code and Ship!</p>
            <div class="social-icons">
                <span>f</span> <span>t</span> <span>i</span> <span>in</span>
            </div>
        </div>
        
        <div class="footer-links">
            <div class="link-group">
                <h4>ABOUT</h4>
                <a href="#">Company</a>
                <a href="#">Blog</a>
            </div>
            <div class="link-group">
                <h4>SUPPORT</h4>
                <a href="#">Contact Support</a>
            </div>
            <div class="link-group">
                <h4>PLATFORM</h4>
                <a href="#">Pricing</a>
                <a href="#">FAQ</a>
            </div>
            <div class="link-group">
                <h4>CONTACT</h4>
                <p>+923070707782</p>
            </div>
        </div>
    </div>
</footer>
</body>

</html>
</body>
</html>

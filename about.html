<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - Mushaba Khan</title>
    <style>
    /* This centers the black box on the screen */
        .testimonial-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            width: 100%;
            font-family: Arial, sans-serif;
        }

        .testimonial-box {
            background-color: #000;
            color: #fff;
            padding: 60px 40px;
            border-radius: 20px;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .quote {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .orange {
            color: #ff4d00;
            font-weight: bold;
        }

        .profile-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #fff;
            margin-bottom: 10px;
            object-fit: cover;
        }

        h4 { margin: 5px 0; color: #ccc; }
        .name { color: #ff4d00; font-weight: bold; }
    </style>
</head>
<body>

<section class="testimonial-wrapper">
    <div class="testimonial-box">
        <p class="quote">
            <span class="orange">Designpro</span> took my billion-dollar baby idea, slapped their design magic on it, and boom – branding so good it makes my other ventures look like lemonade stands. <span class="orange">Twist</span> isn't just a design agency; they're your ticket to the big leagues.
        </p>
        
        <div class="profile-area">
            <img src="download4.jpg" class="avatar" alt="Mushaba">
            <h4>Junior Front-end Developer</h4>
            <p class="name">Mushaba khan</p>
        </div>
    </div>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.pricing-section {
    padding: 80px 5%;
    text-align: center;
    background-color: #fff;
}

.pricing-header h2 {
    font-size: 3rem;
    color: #0b1d3f; /* Dark blue/black heading */
    margin-top: 10px;
}

.pricing-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 50px;
    flex-wrap: wrap;
}

/* Card Design */
.pricing-card {
    border: 2px solid #ff4d00; /* Orange border */
    border-radius: 20px;
    padding: 40px;
    width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: white;
}

/* Badges at the top of cards */
.plan-tag {
    padding: 8px 25px;
    border-radius: 50px;
    color: white;
    font-weight: bold;
    margin-bottom: 25px;
}

.black-tag { background-color: black; }
.orange-tag { background-color: #ff4d00; }

/* Pricing Text */
.price {
    font-size: 3.5rem;
    font-weight: bold;
    color: #ff4d00;
    margin-bottom: 20px;
}

.currency { font-size: 2rem; vertical-align: super; }
.period { font-size: 1rem; color: #333; font-weight: normal; }

/* Features List */
.features {
    list-style: none;
    padding: 0;
    margin: 20px 0 40px 0;
    color: #666;
    line-height: 2;
}

.features li {
    border-bottom: 1px solid #eee;
    padding: 5px 0;
}

/* Orange Button */
.book-btn {
    background-color: #ff4d00;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 77, 0, 0.3);
    transition: 0.3s;
}

.book-btn:hover {
    transform: scale(1.05);
    background-color: #e64500;
}

.projects-section {
    padding: 80px 5%;
    text-align: center;
    background-color: #fff;
}

.projects-header h2 {
    font-size: 3.5rem;
    color: #0b1d3f;
    margin: 10px 0;
}

.projects-header p {
    color: #666;
    font-size: 1.2rem;
    margin-bottom: 50px;
}

/* Container for the whole section */
.projects-section {
    padding: 80px 0;
    width: 100%;
    background-color: #fff;
    display: flex;
    justify-content: center; /* Centers everything horizontally */
}

.projects-container {
    width: 90%;
    max-width: 1000px; /* This makes the section 'short' and centered */
    text-align: center;
}

.projects-header h2 {
    font-size: 2.5rem;
    color: #0b1d3f;
    margin: 10px 0;
}

.projects-header p {
    color: #666;
    margin-bottom: 40px;
}

/* Compact Grid Layout */
.projects-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 columns */
    gap: 20px; /* Space between cards */
}

.project-card {
    background: #f4f4f4;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    transition: transform 0.3s ease;
}

.project-card:hover {
    transform: translateY(-5px); /* Subtle lift on hover */
}

.project-card img {
    width: 100%;
    height: 280px; /* Fixed height to keep it 'short' */
    object-fit: cover; /* Prevents image stretching */
    display: block;
}

/* Badge Styling */
.badge {
    display: inline-block;
    padding: 6px 14px;
    background: #fff5f0;
    color: #ff4d00;
    border: 1px solid #ff4d00;
    border-radius: 50px;
    font-size: 13px;
    font-weight: bold;
}

/* Responsive: Stacks on small mobile screens */
@media (max-width: 600px) {
    .projects-grid {
        grid-template-columns: 1fr;
    }

    </style>
</head>
<body>
<section class="pricing-section">
    <div class="pricing-header">
        <span class="badge">↗ Pricing</span>
        <h2>Choose Your Membership</h2>
    </div>

    <div class="pricing-container">
        <div class="pricing-card">
            <span class="plan-tag black-tag">Standard</span>
            <div class="price">
                <span class="currency">$</span>19<span class="period">/month</span>
            </div>
            <ul class="features">
                <li>Access to basic features</li>
                <li>5 Projects</li>
                <li>Email Support</li>
            </ul>
            <button class="book-btn">Book a call 👥</button>
        </div>

        <div class="pricing-card">
            <span class="plan-tag orange-tag">Premium</span>
            <div class="price">
                <span class="currency">$</span>49<span class="period">/month</span>
            </div>
            <ul class="features">
                <li>All features unlocked</li>
                <li>Unlimited Projects</li>
                <li>Priority Support</li>
            </ul>
            <button class="book-btn">Book a call 👥</button>
        </div>
    </div>
</section>
<section class="projects-section">
    <div class="projects-container">
        <div class="projects-header">
</body>
</html>
